name: Export Android APK
on:
  push:
    branches: [main]
jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Godot Android export
        uses: dulvui/godot-android-export@v4
        with:
          godot-version: 4.6.1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ./*.apk
